name: ci
on: [pull_request]
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v3

            - name: Setup Node
              uses: actions/setup-node@v3
              with:
                node-version: 16
                cache: npm

            - name: Install Dependencies
              run: yarn install

            - name: Linting
              run: yarn lint

            - name: Testing
              run: yarn test

            - name: Build
              run: yarn build
                